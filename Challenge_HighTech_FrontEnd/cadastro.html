<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/login.css">
    <link rel="shortcut icon" href="imgs/cloud.svg" type="image/x-icon">
    <title>Cadastrar-se</title>
</head>
<body>
    <header>
        <div id="content-box">
            <a href="/"><img src="imgs/salesforce_negativa.svg" alt=""></a> 
            <form>
                <div class="input-box">
                    <p>Nome:</p>
                    <input type="text" placeholder="Nome">
                </div>
                <div class="input-box">
                    <p>Sobrenome:</p>
                    <input type="text" placeholder="Sobrenome">
                </div>
                <div class="input-box">
                    <p>Cargo:</p>
                    <input type="text" placeholder="Cargo">
                </div>
                <div class="input-box">
                    <p>Email:</p>
                    <input type="email" placeholder="@email.com">
                </div>
                <div class="input-box">
                    <p>Telefone:</p>
                    <input type="tel"  placeholder="Telefone"/>
                    <small>Format: (99)99999-9999</small>
                </div>
                <div class="input-box">
                    <p>Senha:</p>
                    <input type="password" placeholder="Senha">
                </div>
                <div class="input-box">
                    <button id="login">
                        <a href="/">Finalizar Cadastro</a>
                    </button>
                </div>
            </form> 
        </div>


        <div id="container-login">
        </div>
    </header>

    <footer>
        <div id="footer_content">
            <img src="imgs/Logos.svg" alt="">
            <ul class="footer_list">
                <li><a href="equipe.html" target="_blank">Dev Teams</a></li>
                <li><a href="organograma.html" target="_blank">Organograma</a></li>
            </ul>
        </div>
        <div id="footer_copyright"> &#169 2023 all rights reserved.</div>
    </footer>
</body>
</html>
